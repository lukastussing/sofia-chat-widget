<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sofia Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #b00000;
      --brand-dark: #8a0000;
      --brand-light: #fdf0f0;
      --white: #ffffff;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 0;
    }

    #sofia-block {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 720px;
      height: 580px;
      background: var(--white);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(176,0,0,0.12);
      overflow: hidden;
      border: 1px solid #e8c0c0;
    }

    #chat-header {
      background: var(--brand);
      color: var(--white);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #chat-header .avatar {
      width: 42px; height: 42px;
      background: var(--white);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #chat-header .avatar svg { width: 26px; height: 26px; fill: var(--brand); }
    #chat-header .info { flex: 1; }
    #chat-header .name { font-weight: 700; font-size: 16px; }
    #chat-header .status { font-size: 12px; opacity: 0.85; margin-top: 2px; }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: #7dffb0;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #fafafa;
    }

    .msg { display: flex; gap: 8px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }

    .msg-bubble {
      padding: 10px 15px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--brand);
      color: var(--white);
      border-bottom-right-radius: 4px;
    }
    .msg.bot .msg-bubble {
      background: var(--white);
      color: #222;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border: 1px solid #f0dada;
    }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #fbe8e8;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg-avatar svg { width: 18px; height: 18px; fill: var(--brand); }

    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: #cca0a0;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    #chat-input-area {
      display: flex;
      padding: 14px 16px;
      gap: 10px;
      border-top: 1px solid #f0dada;
      background: var(--white);
      flex-shrink: 0;
      align-items: flex-end;
    }
    #chat-input {
      flex: 1;
      border: 1.5px solid #e0b0b0;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      font-family: 'Segoe UI', sans-serif;
      resize: none;
      max-height: 80px;
      transition: border-color 0.2s;
      line-height: 1.4;
    }
    #chat-input:focus { border-color: var(--brand); }
    #chat-send {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--brand);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    #chat-send:hover { background: var(--brand-dark); }
    #chat-send svg { width: 18px; height: 18px; fill: var(--white); }
    #chat-send:disabled { background: #ccc; cursor: not-allowed; }

    #chat-messages::-webkit-scrollbar { width: 5px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: #e0b0b0; border-radius: 4px; }
  </style>
</head>
<body>

<div id="sofia-block">

  <div id="chat-header">
    <div class="avatar">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <div class="info">
      <div class="name">Sofia Assistant</div>
      <div class="status"><span class="status-dot"></span>ERP Support · Online</div>
    </div>
  </div>

  <div id="chat-messages">
    <div class="msg bot">
      <div class="msg-avatar">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      </div>
      <div class="msg-bubble">👋 Hi! I'm <strong>Sofia Assistant</strong>, your ERP support bot for AMEX Healthcare's Business Central system.<br><br>How can I help you today?</div>
    </div>
  </div>

  <div id="chat-input-area">
    <textarea id="chat-input" placeholder="Ask Sofia anything..." rows="1"></textarea>
    <button id="chat-send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
  const LOGIC_APP_URL = "https://prod-18.northeurope.logic.azure.com:443/workflows/107fba82c23745dca455955e87877d0c/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=om__GawxfieYKxMW8PJ6WnR1nV5E2cyZS5Fvb9e5cH0";

  const messages = document.getElementById('chat-messages');
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send');

  let threadId = null; // stores thread across messages in same session

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener('click', sendMessage);

  function addMessage(text, role) {
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    if (role === 'bot') {
      msg.innerHTML = `
        <div class="msg-avatar">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
        </div>
        <div class="msg-bubble">${text}</div>`;
    } else {
      msg.innerHTML = `<div class="msg-bubble">${text}</div>`;
    }
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
  }

  function addTypingIndicator() {
    const msg = document.createElement('div');
    msg.className = 'msg bot';
    msg.id = 'typing';
    msg.innerHTML = `
      <div class="msg-avatar">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      </div>
      <div class="msg-bubble">
        <div class="typing-indicator"><span></span><span></span><span></span></div>
      </div>`;
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTypingIndicator() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage(text, 'user');
    addTypingIndicator();

    try {
      // Send thread_id on follow-up messages so Sofia remembers the conversation
      const payload = { message: text };
      if (threadId) payload.thread_id = threadId;

      const res = await fetch(LOGIC_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      removeTypingIndicator();

      // Store thread_id returned from Logic App for next message
      if (data.thread_id) threadId = data.thread_id;

      const replyText = data.text || "Sorry, I couldn't get a response. Please try again.";
      addMessage(replyText, 'bot');

    } catch (err) {
      removeTypingIndicator();
      addMessage("⚠️ Connection error. Please check your network and try again.", 'bot');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 80) + 'px';
  });
</script>
</body>
</html>
